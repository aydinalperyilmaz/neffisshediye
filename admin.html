<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neffiss Hediye — Admin Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#E91E8C;--pink2:#F06292;--pink-dark:#C2185B;--pink-light:#FCE4EC;
  --green:#22C55E;--red:#EF4444;--yellow:#F59E0B;--blue:#3B82F6;--purple:#8B5CF6;
  --bg:#0f0a0d;--surface:#1e0f18;--surface2:#2d1525;--border:#4a1f38;
  --text:#f5e6ec;--sub:#c4899e;--accent:#E91E8C;
  --radius:12px;--mono:'SF Mono','Fira Code',monospace
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
.sb{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--pink),#ff80ab);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-logo p{font-size:11px;color:var(--sub);margin-top:3px}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--sub)}
.sb-user span{color:var(--text);font-weight:600}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--sub);transition:all .15s;margin-bottom:2px}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.on{background:rgba(233,30,140,.15);color:var(--pink)}
.sb-item .ic{font-size:16px;width:20px;text-align:center}
.badge{background:var(--red);color:#fff;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:auto}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border)}
.sb-logout{width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;color:var(--red);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* MAIN */
.main{margin-left:220px;flex:1;padding:24px;min-height:100vh}
.page-title{font-size:22px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--sub);margin-bottom:20px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-icon{font-size:24px;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:800;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--sub)}
.stat-change{font-size:11px;margin-top:6px;color:var(--green)}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-title{font-size:14px;font-weight:700}
.table-btn{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--text);font-family:inherit}
.table-btn.on{background:var(--accent);color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:var(--sub);border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border:none}
tr:hover td{background:rgba(233,30,140,.03)}

/* BADGES */
.badge-green{background:rgba(34,197,94,.15);color:var(--green);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-red{background:rgba(239,68,68,.15);color:var(--red);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-purple{background:rgba(139,92,246,.15);color:var(--purple);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-pink{background:rgba(233,30,140,.15);color:var(--pink);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}

/* ACTION BUTTONS */
.act-btn{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.act-edit{background:rgba(59,130,246,.15);color:var(--blue)}
.act-approve{background:rgba(34,197,94,.15);color:var(--green)}
.act-reject{background:rgba(239,68,68,.15);color:var(--red)}
.act-warn{background:rgba(245,158,11,.15);color:var(--yellow)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--sub);margin-bottom:20px}
.login-label{font-size:11px;font-weight:700;color:var(--sub);display:block;margin-bottom:4px;margin-top:10px}
.login-input{width:100%;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:2px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit}
.login-btn:disabled{opacity:.4;cursor:not-allowed}
select.login-input option{background:var(--surface)}

/* NOTIF */
.notif{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;transform:translateY(8px)}
.notif.show{opacity:1;transform:translateY(0)}

/* LOGIN PAGE */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);width:100%}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:380px}

/* ORDER DETAIL */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.detail-card{background:var(--surface2);border-radius:10px;padding:14px}
.detail-label{font-size:11px;color:var(--sub);margin-bottom:4px}
.detail-val{font-size:15px;font-weight:700}
.gift-note-display{background:rgba(233,30,140,.1);border:1px solid rgba(233,30,140,.3);border-radius:10px;padding:12px;margin:10px 0;font-size:13px;color:var(--pink2)}

/* RESPONSIVE */
@media(max-width:768px){
  .sb{display:none}
  .main{margin-left:0}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="appRoot" style="width:100%"></div>
<div class="notif" id="notif"></div>

<!-- ADD SHOP MODAL -->
<div class="overlay" id="addShopModal" onclick="if(event.target===this)closeM('addShopModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">🌸 Yeni Çiçekçi Ekle</div>
    <div class="modal-sub">Ghost model — gerçek çiçekçiyi sisteme ekle</div>
    <label class="login-label">Müşteriye Gösterilen Ad *</label>
    <input class="login-input" id="nsName" placeholder="Çiçek Bahçesi">
    <label class="login-label">Telefon</label>
    <input class="login-input" id="nsPhone" placeholder="0212 XXX XX XX">
    <label class="login-label">Adres</label>
    <input class="login-input" id="nsAddr" placeholder="Şişli, İstanbul">
    <label class="login-label">Min. Sipariş (₺)</label>
    <input class="login-input" id="nsMin" type="number" value="150">
    <label class="login-label">Hazırlık Süresi (dk)</label>
    <input class="login-input" id="nsPrep" type="number" value="30">
    <label class="login-label">Kapak Fotoğrafı URL</label>
    <input class="login-input" id="nsCover" placeholder="https://...">
    <div style="background:rgba(233,30,140,.1);border-radius:10px;padding:14px;margin-top:14px;border:1px solid rgba(233,30,140,.3)">
      <div style="font-size:12px;font-weight:700;color:var(--pink);margin-bottom:8px">🎭 Gerçek Çiçekçi Bilgileri (Ghost)</div>
      <label class="login-label">Gerçek Çiçekçi Adı</label>
      <input class="login-input" id="nsRealName" placeholder="Çiçekçi Ahmet Usta">
      <label class="login-label">Pickup Adres</label>
      <input class="login-input" id="nsPickupAddr" placeholder="Vatan Cd. No:12 Çağlayan">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label class="login-label">Pickup Telefon</label><input class="login-input" id="nsPickupPhone" placeholder="0532 XXX XX XX"></div>
        <div><label class="login-label">WhatsApp</label><input class="login-input" id="nsPickupWa" placeholder="0532 XXX XX XX"></div>
      </div>
      <label class="login-label">Not</label>
      <input class="login-input" id="nsPickupNote" placeholder="Ali bey'i sor, sabah 9'dan açık">
    </div>
    <button class="login-btn" onclick="createShop()">🌸 Çiçekçi Oluştur</button>
    <button class="login-btn" onclick="closeM('addShopModal')" style="background:var(--surface2);color:var(--text);margin-top:6px">İptal</button>
  </div>
</div>

<!-- ADD MENU ITEM MODAL -->
<div class="overlay" id="addItemModal" onclick="if(event.target===this)closeM('addItemModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="addItemTitle">🌸 Ürün Ekle</div>
    <div class="modal-sub">Çiçek veya hediye ürünü ekle</div>
    <label class="login-label">Ürün Adı *</label>
    <input class="login-input" id="miName" placeholder="Kırmızı Güller Buketi (12 Adet)">
    <label class="login-label">Açıklama</label>
    <input class="login-input" id="miDesc" placeholder="Taze kırmızı güller, yeşillik ve kurdela ile hazırlanmış">
    <label class="login-label">Fiyat (₺) *</label>
    <input class="login-input" id="miPrice" type="number" placeholder="350">
    <label class="login-label">Görsel URL</label>
    <input class="login-input" id="miImg" placeholder="https://...jpg">
    <button class="login-btn" onclick="saveMenuItem()">➕ Ekle & Devam</button>
    <button class="login-btn" onclick="closeM('addItemModal')" style="background:var(--surface2);color:var(--text);margin-top:6px">Bitti</button>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="overlay" id="orderModal" onclick="if(event.target===this)closeM('orderModal')">
  <div class="modal" onclick="event.stopPropagation()" id="orderModalContent"></div>
</div>

<script>
const SB="https://fnfczglxcnqgrdiqfuig.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZuZmN6Z2x4Y25xZ3JkaXFmdWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE1ODcsImV4cCI6MjA4OTk0NzU4N30.M8lfKoW6Rg32RSELlKqpymx_BQbGTcESBYB5i8BlcEM";
let HD={apikey:SK,Authorization:"Bearer "+SK};
const COMMISSION=7;
const kTL=k=>Math.round((k||0)/100);
const fm=n=>Number(n||0).toLocaleString("tr-TR");

async function sg(p){try{const r=await fetch(SB+"/rest/v1/"+p,{headers:HD});if(!r.ok)return null;return JSON.parse(await r.text())}catch{return null}}
async function sRPC(fn,params){try{const r=await fetch(SB+"/rest/v1/rpc/"+fn,{method:"POST",headers:{...HD,"Content-Type":"application/json"},body:JSON.stringify(params)});if(!r.ok)return null;return JSON.parse(await r.text())}catch{return null}}
async function sPost(t,b){try{const r=await fetch(SB+"/rest/v1/"+t,{method:"POST",headers:{...HD,"Content-Type":"application/json",Prefer:"return=representation"},body:JSON.stringify(b)});if(!r.ok)return null;return JSON.parse(await r.text())}catch{return null}}
async function sPatch(t,id,b){try{const r=await fetch(SB+"/rest/v1/"+t+"?id=eq."+id,{method:"PATCH",headers:{...HD,"Content-Type":"application/json",Prefer:"return=representation"},body:JSON.stringify(b)});if(!r.ok)return null;return JSON.parse(await r.text())}catch{return null}}
async function sDel(t,id){try{await fetch(SB+"/rest/v1/"+t+"?id=eq."+id,{method:"DELETE",headers:HD})}catch{}}

function nf(msg){const el=document.getElementById("notif");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),3000)}
function closeM(id){document.getElementById(id).classList.remove("show")}

// ═══ STATE ═══
let adminUser=null;
let activeTab="dashboard";
let allShops=[], allOrders=[], allUsers=[], allItems=[];
let currentAddShopId=null;

const ST={
  pending:{l:"⏳ Bekliyor",c:"badge-yellow"},
  confirmed:{l:"✅ Onaylandı",c:"badge-blue"},
  preparing:{l:"🌸 Hazırlanıyor",c:"badge-purple"},
  sent_to_restaurant:{l:"📞 İletildi",c:"badge-blue"},
  restaurant_preparing:{l:"🌸 Hazırlanıyor",c:"badge-purple"},
  ready_for_courier:{l:"🛵 Kuryede",c:"badge-green"},
  on_the_way:{l:"🚴 Yolda",c:"badge-green"},
  delivered:{l:"✅ Teslim",c:"badge-green"},
  cancelled:{l:"❌ İptal",c:"badge-red"},
  pending_payment:{l:"💳 Ödeme Bekliyor",c:"badge-yellow"}
};

// ═══ RENDER ═══
function renderApp(){
  const pendingO=allOrders.filter(o=>o.status==="pending").length;
  const pendingS=allShops.filter(s=>!s.is_active).length;

  document.getElementById("appRoot").innerHTML=`
    <div class="sb">
      <div class="sb-logo">
        <h1>🌸 Neffiss Hediye</h1>
        <p>Admin Panel</p>
      </div>
      <div class="sb-user">Hoş geldin, <span>${adminUser?.name||"Admin"}</span></div>
      <div class="sb-nav">
        ${[
          ["dashboard","📊","Dashboard",0],
          ["shops","🌸","Çiçekçiler",pendingS],
          ["orders","📦","Siparişler",pendingO],
          ["users","👥","Kullanıcılar",0],
        ].map(([k,ic,l,b])=>`
          <div class="sb-item ${activeTab===k?"on":""}" onclick="switchTab('${k}')">
            <span class="ic">${ic}</span><span>${l}</span>
            ${b?`<span class="badge">${b}</span>`:""}
          </div>`).join("")}
        <div style="margin-top:12px;padding:8px 12px;font-size:11px;color:var(--sub);font-weight:700">BAĞLANTILAR</div>
        <div class="sb-item" onclick="window.open('hediyeindex.html','_blank')"><span class="ic">🌸</span>Müşteri Paneli</div>
        <div class="sb-item" onclick="window.open('admin.html','_blank')"><span class="ic">🍔</span>Yemek Admini</div>
      </div>
      <div class="sb-footer">
        <button class="sb-logout" onclick="doLogout()">🚪 Çıkış Yap</button>
      </div>
    </div>
    <div class="main" id="ct"></div>`;

  renderContent();
}

function switchTab(tab){activeTab=tab;renderApp()}
function renderContent(){
  ({dashboard:rDash,shops:rShops,orders:rOrders,users:rUsers}[activeTab]||rDash)();
}

// ═══ DASHBOARD ═══
function rDash(){
  const n=new Date(),ts=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const ms=new Date(n.getFullYear(),n.getMonth(),1);
  const tO=allOrders.filter(o=>new Date(o.created_at)>=ts&&o.status==="delivered");
  const mO=allOrders.filter(o=>new Date(o.created_at)>=ms&&o.status==="delivered");
  const tR=tO.reduce((s,o)=>s+kTL(o.total||0),0);
  const mR=mO.reduce((s,o)=>s+kTL(o.total||0),0);
  const pending=allOrders.filter(o=>o.status==="pending").length;

  document.getElementById("ct").innerHTML=`
    <div class="page-title">📊 Dashboard</div>
    <div class="page-sub">Neffiss Hediye genel bakış</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val">${fm(tR)} ₺</div><div class="stat-label">Bugünkü Ciro</div></div>
      <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-val">${fm(mR)} ₺</div><div class="stat-label">Aylık Ciro</div></div>
      <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-val" style="color:var(--yellow)">${pending}</div><div class="stat-label">Bekleyen Sipariş</div></div>
      <div class="stat-card"><div class="stat-icon">🌸</div><div class="stat-val">${allShops.filter(s=>s.is_active&&s.is_open).length}</div><div class="stat-label">Aktif Çiçekçi</div></div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><div class="table-title">📦 Son Siparişler</div><button class="table-btn" onclick="switchTab('orders')">Tümü →</button></div>
      <table>
        <tr><th>No</th><th>Çiçekçi</th><th>Durum</th><th>Tutar</th><th>Zaman</th><th></th></tr>
        ${allOrders.slice(0,8).map(o=>{
          const st=ST[o.status]||{l:o.status,c:""};
          const t=o.created_at?new Date(o.created_at).toLocaleString("tr-TR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"";
          return`<tr>
            <td style="font-family:var(--mono);font-weight:700;font-size:12px">${o.order_number||"—"}</td>
            <td>${o.restaurant?.name||"—"}</td>
            <td><span class="${st.c}">${st.l}</span></td>
            <td style="font-weight:700">${fm(kTL(o.total||0))} ₺</td>
            <td style="font-size:12px;color:var(--sub)">${t}</td>
            <td><button class="act-btn act-edit" onclick="showOrderDetail('${o.id}')">👁️</button></td>
          </tr>`;
        }).join("")}
      </table>
    </div>`;
}

// ═══ SHOPS ═══
function rShops(){
  const pending=allShops.filter(s=>!s.is_active);
  const active=allShops.filter(s=>s.is_active);

  document.getElementById("ct").innerHTML=`
    <div class="page-title">🌸 Çiçekçiler</div>
    <div class="page-sub">Tüm çiçekçileri yönet</div>

    <button class="table-btn on" onclick="document.getElementById('addShopModal').classList.add('show')" style="margin-bottom:16px;padding:10px 20px">➕ Yeni Çiçekçi Ekle</button>

    ${pending.length?`<div class="table-wrap" style="border-color:rgba(245,158,11,.5)">
      <div class="table-header" style="background:rgba(245,158,11,.05)">
        <div class="table-title" style="color:var(--yellow)">⏳ Onay Bekleyen (${pending.length})</div>
      </div>
      <table>
        <tr><th>Çiçekçi</th><th>Adres</th><th>İşlem</th></tr>
        ${pending.map(s=>`<tr>
          <td style="font-weight:700">${s.name}</td>
          <td style="font-size:12px;color:var(--sub)">${s.address||"—"}</td>
          <td><div style="display:flex;gap:6px">
            <button class="act-btn act-approve" onclick="approveShop('${s.id}')">✓ Onayla</button>
            <button class="act-btn act-reject" onclick="deleteShop('${s.id}','${s.name.replace(/'/g,"\\'")}')">✕ Sil</button>
          </div></td>
        </tr>`).join("")}
      </table>
    </div>`:""}

    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">🌸 Aktif Çiçekçiler (${active.length})</div>
      </div>
      <table>
        <tr><th>Çiçekçi</th><th>Durum</th><th>Menü</th><th>Sipariş</th><th>Ciro</th><th>İşlem</th></tr>
        ${active.map(s=>{
          const sO=allOrders.filter(o=>o.restaurant_id===s.id&&o.status==="delivered");
          const rev=sO.reduce((sum,o)=>sum+kTL(o.total||0),0);
          const menu=allItems.filter(m=>m.restaurant_id===s.id);
          const st=s.is_open?"badge-green":"badge-red";
          return`<tr>
            <td><div style="font-weight:700">${s.name}</div><div style="font-size:11px;color:var(--sub)">${s.address||"—"}</div></td>
            <td><span class="${st}">${s.is_open?"🟢 Açık":"🔴 Kapalı"}</span></td>
            <td>${menu.length} ürün <button class="act-btn act-edit" onclick="showAddItem('${s.id}','${s.name.replace(/'/g,"\\'")}')">+</button></td>
            <td>${sO.length}</td>
            <td style="font-weight:700;color:var(--pink)">${fm(rev)} ₺</td>
            <td><div style="display:flex;gap:4px">
              <button class="act-btn act-edit" onclick="showShopDetail('${s.id}')">👁️</button>
              ${s.is_open?`<button class="act-btn act-warn" onclick="toggleShop('${s.id}',false)">⏸️</button>`:`<button class="act-btn act-approve" onclick="toggleShop('${s.id}',true)">▶️</button>`}
              <button class="act-btn act-reject" onclick="deleteShop('${s.id}','${s.name.replace(/'/g,"\\'")}')">🗑️</button>
            </div></td>
          </tr>`;
        }).join("")}
      </table>
    </div>`;
}

function showAddItem(restId,restName){
  currentAddShopId=restId;
  document.getElementById("addItemTitle").textContent=`🌸 ${restName} — Ürün Ekle`;
  document.getElementById("miName").value="";
  document.getElementById("miDesc").value="";
  document.getElementById("miPrice").value="";
  document.getElementById("miImg").value="";
  document.getElementById("addItemModal").classList.add("show");
}

async function saveMenuItem(){
  const name=(document.getElementById("miName")?.value||"").trim();
  const price=parseFloat(document.getElementById("miPrice")?.value||0);
  const desc=(document.getElementById("miDesc")?.value||"").trim();
  const img=(document.getElementById("miImg")?.value||"").trim();
  if(!name||!price){nf("❌ Ad ve fiyat zorunlu");return}
  const body={restaurant_id:currentAddShopId,name,description:desc||null,price:Math.round(price*100),image_url:img||null,is_available:true};
  const res=await sPost("menu_items",body);
  if(res&&res.length){
    allItems.push(res[0]);
    nf("✅ "+name+" eklendi");
    document.getElementById("miName").value="";
    document.getElementById("miDesc").value="";
    document.getElementById("miPrice").value="";
    document.getElementById("miImg").value="";
    renderContent();
  }else nf("❌ Eklenemedi");
}

async function approveShop(id){
  const r=await sRPC("admin_update_restaurant",{p_admin_id:adminUser.id,p_restaurant_id:id,p_data:{is_active:true}});
  if(r&&r.success){const s=allShops.find(x=>x.id===id);if(s)s.is_active=true;nf("✅ Onaylandı");renderContent()}
  else nf("❌ Hata");
}

async function toggleShop(id,open){
  const r=await sRPC("admin_update_restaurant",{p_admin_id:adminUser.id,p_restaurant_id:id,p_data:{is_open:open}});
  if(r&&r.success){const s=allShops.find(x=>x.id===id);if(s)s.is_open=open;nf(open?"▶️ Açıldı":"⏸️ Kapatıldı");renderContent()}
  else nf("❌ Hata");
}

async function deleteShop(id,name){
  if(!confirm(`"${name}" silinecek. Emin misiniz?`))return;
  const res=await sRPC("admin_delete_restaurant",{p_admin_id:adminUser.id,p_restaurant_id:id});
  if(res&&res.success){allShops=allShops.filter(s=>s.id!==id);nf("🗑️ Silindi");renderContent()}
  else nf("❌ Silinemedi");
}

function showShopDetail(id){
  const s=allShops.find(x=>x.id===id);
  if(!s)return;
  const menu=allItems.filter(m=>m.restaurant_id===id);
  const sOrders=allOrders.filter(o=>o.restaurant_id===id&&o.status==="delivered");
  const rev=sOrders.reduce((sum,o)=>sum+kTL(o.total||0),0);

  const el=document.getElementById("orderModalContent");
  el.innerHTML=`
    <div class="modal-title">🌸 ${s.name}</div>
    <div class="modal-sub">${s.address||"—"} · ${s.phone||"—"}</div>
    <div class="detail-grid">
      <div class="detail-card"><div class="detail-label">Durum</div><div class="detail-val"><span class="${s.is_open?"badge-green":"badge-red"}">${s.is_open?"Açık":"Kapalı"}</span></div></div>
      <div class="detail-card"><div class="detail-label">Toplam Sipariş</div><div class="detail-val">${sOrders.length}</div></div>
      <div class="detail-card"><div class="detail-label">Ciro</div><div class="detail-val" style="color:var(--pink)">${fm(rev)} ₺</div></div>
      <div class="detail-card"><div class="detail-label">Menü</div><div class="detail-val">${menu.length} ürün</div></div>
    </div>
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">🌸 Menü</div>
    <div style="max-height:220px;overflow-y:auto">
      ${menu.map(m=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span>${m.name}${!m.is_available?' <span class="badge-red" style="font-size:9px">Pasif</span>':""}</span>
        <span style="font-weight:700;font-family:var(--mono)">${fm(kTL(m.price||0))} ₺</span>
      </div>`).join("")||"<div style='color:var(--sub);font-size:12px'>Menü boş</div>"}
    </div>
    <button class="login-btn" onclick="showAddItem('${s.id}','${s.name.replace(/'/g,"\\'")}');closeM('orderModal')" style="margin-top:16px">➕ Ürün Ekle</button>
    <button class="login-btn" onclick="closeM('orderModal')" style="background:var(--surface2);color:var(--text);margin-top:6px">Kapat</button>`;
  document.getElementById("orderModal").classList.add("show");
}

// ═══ CREATE SHOP ═══
async function createShop(){
  const name=(document.getElementById("nsName")?.value||"").trim();
  const phone=(document.getElementById("nsPhone")?.value||"").trim();
  const addr=(document.getElementById("nsAddr")?.value||"").trim();
  const min=parseInt(document.getElementById("nsMin")?.value||150)*100;
  const prep=parseInt(document.getElementById("nsPrep")?.value||30);
  const cover=(document.getElementById("nsCover")?.value||"").trim();
  const realName=(document.getElementById("nsRealName")?.value||"").trim();
  const pickupAddr=(document.getElementById("nsPickupAddr")?.value||"").trim();
  const pickupPhone=(document.getElementById("nsPickupPhone")?.value||"").trim();
  const pickupWa=(document.getElementById("nsPickupWa")?.value||"").trim();
  const pickupNote=(document.getElementById("nsPickupNote")?.value||"").trim();

  if(!name){nf("❌ Çiçekçi adı zorunlu");return}
  if(!addr){nf("❌ Adres zorunlu");return}

  const slug=name.toLowerCase().replace(/ç/g,"c").replace(/ğ/g,"g").replace(/ı/g,"i").replace(/ö/g,"o").replace(/ş/g,"s").replace(/ü/g,"u").replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"")+"-hediye";

  const res=await sRPC("admin_add_restaurant",{
    p_admin_id:adminUser.id,
    p_name:name,p_slug:slug,
    p_category:"Çiçek & Hediye",
    p_phone:phone||null,
    p_address:addr,
    p_cover_url:cover||null,
    p_commission:COMMISSION
  });

  if(!res||!res.success){nf("❌ "+(res?.error||"Oluşturulamadı"));return}

  // Ghost fields + extra settings
  const ghostFields={
    is_ghost:true,is_active:true,is_open:true,
    min_order:min,avg_prep_time:prep,
    ...(realName&&{real_name:realName}),
    ...(pickupAddr&&{pickup_address:pickupAddr}),
    ...(pickupPhone&&{pickup_phone:pickupPhone}),
    ...(pickupWa&&{pickup_whatsapp:pickupWa}),
    ...(pickupNote&&{pickup_notes:pickupNote})
  };
  await sPatch("restaurants",res.id,ghostFields);

  allShops.unshift({id:res.id,name,category:"Çiçek & Hediye",address:addr,phone,cover_url:cover||null,is_active:true,is_open:true,...ghostFields});
  closeM("addShopModal");
  nf("✅ "+name+" eklendi");
  renderContent();
}

function showOrderDetail(id){
  const o=allOrders.find(x=>x.id===id);
  if(!o)return;
  const note=o.customer_note||"";
  const nm=note.match(/^\[([^\]]+)\]/);
  const cn=o.customer?.full_name||nm?.[1]?.split("•")[0]?.trim()||"Misafir";
  const cp=o.customer?.phone||"";
  const st=ST[o.status]||{l:o.status,c:""};
  const giftMatch=note.match(/💌 Hediye Notu: (.+)/);
  const giftNote=giftMatch?giftMatch[1]:"";
  const timeMatch=note.match(/\[Çiçek Teslimatı • ([^\]]+)\]/);
  const delivTime=timeMatch?timeMatch[1]:"";
  const d=o.created_at?new Date(o.created_at).toLocaleString("tr-TR",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"}):"";

  document.getElementById("orderModalContent").innerHTML=`
    <div class="modal-title">📦 Sipariş #${o.order_number||o.id?.slice(0,8)}</div>
    <div class="modal-sub">${d} · <span class="${st.c}">${st.l}</span></div>
    <div class="detail-grid">
      <div class="detail-card"><div class="detail-label">Müşteri</div><div class="detail-val">👤 ${cn}</div>${cp?`<div style="font-size:12px;color:var(--sub);margin-top:4px">📞 ${cp}</div>`:""}</div>
      <div class="detail-card"><div class="detail-label">Çiçekçi</div><div class="detail-val">🌸 ${o.restaurant?.name||"—"}</div></div>
      <div class="detail-card"><div class="detail-label">Tutar</div><div class="detail-val">${fm(kTL(o.total||0))} ₺</div></div>
      <div class="detail-card"><div class="detail-label">Adres</div><div class="detail-val" style="font-size:12px">${o.delivery_address||"—"}</div></div>
    </div>
    ${delivTime?`<div class="gift-note-display">🕐 <b>Teslimat:</b> ${delivTime}</div>`:""}
    ${giftNote?`<div class="gift-note-display">💌 <b>Hediye Notu:</b> "${giftNote}"</div>`:""}
    <div style="font-size:13px;font-weight:700;margin:12px 0 8px">🛒 Ürünler</div>
    ${(o.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <span><b>${i.quantity}x</b> ${i.name}</span>
      <span style="font-weight:700;font-family:var(--mono)">${fm(kTL(i.total_price||0))} ₺</span>
    </div>`).join("")}
    <button class="login-btn" onclick="closeM('orderModal')" style="background:var(--surface2);color:var(--text);margin-top:16px">Kapat</button>`;
  document.getElementById("orderModal").classList.add("show");
}

// ═══ LOAD DATA ═══
async function loadData(){
  const [shops,ordersRes,usersRes,items]=await Promise.all([
    sg("restaurants?select=id,name,slug,category,is_active,is_open,phone,address,cover_url,rating&category=eq.Çiçek%20%26%20Hediye&order=created_at.desc"),
    sRPC("admin_list_orders",{p_admin_id:adminUser.id,p_limit:500}),
    sRPC("admin_list_users",{p_admin_id:adminUser.id,p_limit:200}),
    sg("menu_items?select=id,name,restaurant_id,price,is_available&limit=1000")
  ]);

  allShops=shops||[];
  allOrders=((ordersRes&&ordersRes.success?ordersRes.data:[])||[])
    .filter(o=>allShops.some(s=>s.id===o.restaurant_id)) // sadece çiçek siparişleri
    .filter(o=>o.status!=="pending_payment");
  allUsers=(usersRes&&usersRes.success?usersRes.data:[])||[];
  allItems=(items||[]).filter(m=>allShops.some(s=>s.id===m.restaurant_id));

  renderApp();

  // Auto-refresh every 30s
  setInterval(async()=>{
    const oRes=await sRPC("admin_list_orders",{p_admin_id:adminUser.id,p_limit:500});
    if(oRes&&oRes.success){
      allOrders=oRes.data.filter(o=>allShops.some(s=>s.id===o.restaurant_id)&&o.status!=="pending_payment");
      renderApp();
    }
  },30000);
}

// ═══ AUTH ═══
function renderLogin(){
  document.getElementById("appRoot").innerHTML=`
    <div class="login-page">
      <div class="login-box">
        <div style="text-align:center;font-size:48px;margin-bottom:12px">🌸</div>
        <div style="font-size:22px;font-weight:800;text-align:center;margin-bottom:6px">Neffiss Hediye</div>
        <div style="font-size:13px;color:var(--sub);text-align:center;margin-bottom:24px">Admin Panel</div>
        <label class="login-label">E-posta</label>
        <input class="login-input" id="lE" placeholder="admin@nefiss.com" style="margin-bottom:10px">
        <label class="login-label">Şifre</label>
        <input class="login-input" id="lP" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <div id="le" style="color:var(--red);font-size:12px;margin:6px 0;display:none"></div>
        <button class="login-btn" onclick="doLogin()">Giriş Yap →</button>
        <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--sub)">
          <a href="admin.html" style="color:var(--pink);text-decoration:none">← Neffiss Yemek Adminine Dön</a>
        </div>
      </div>
    </div>`;
}

async function doLogin(){
  const e=(document.getElementById("lE")?.value||"").trim();
  const p=document.getElementById("lP")?.value||"";
  const er=document.getElementById("le");
  if(!e||!p){er.textContent="E-posta ve şifre girin";er.style.display="block";return}
  er.style.display="none";
  const res=await sRPC("verify_admin_login",{p_email:e,p_password:p});
  if(res&&res.success&&res.role==="admin"){
    adminUser={id:res.user_id,name:res.name,email:res.email};
    localStorage.setItem("nefiss_hediye_admin",JSON.stringify(adminUser));
    await loadData();
  }else{
    er.textContent=res?.error||"Giriş başarısız";er.style.display="block";
  }
}

function doLogout(){
  adminUser=null;
  localStorage.removeItem("nefiss_hediye_admin");
  renderLogin();
}

// ═══ INIT ═══
const saved=localStorage.getItem("nefiss_hediye_admin");
if(saved){try{adminUser=JSON.parse(saved);loadData()}catch{renderLogin()}}
else renderLogin();
</script>
